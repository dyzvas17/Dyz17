<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Haven - Our Secret Space</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111; --card:#1c1c1c; --text:#fff; --accent:#ff4d6d; --glow:#ff4d6d;
  --text-secondary:#aaa; --border:#333;
}
*{box-sizing:border-box;}
body{
  margin:0; font-family:'Poppins', sans-serif; background:var(--bg); color:var(--text);
  display:flex; justify-content:center; align-items:center; min-height:100vh;
  transition:background 0.3s, color 0.3s;
}
.app{
  width:90%; max-width:420px; height:90vh; background:var(--card); border-radius:25px;
  padding:20px; display:flex; flex-direction:column; align-items:center; transition:0.3s;
  overflow-y:auto; box-shadow:0 10px 40px rgba(0,0,0,0.3);
  position:relative;
}
button{border:none; cursor:pointer; transition:0.3s; font-family:'Poppins',sans-serif;}
.big-btn{margin-top:15px; padding:14px 0; width:100%; border-radius:12px; font-size:18px; background:var(--accent); color:#fff; box-shadow:0 0 12px var(--glow); font-weight:600;}
.square-btn{width:140px; height:140px; margin:10px; border-radius:15px; font-size:18px; background:var(--accent); color:#fff; display:flex; justify-content:center; align-items:center; box-shadow:0 0 12px var(--glow); font-weight:600;}
.square-btn:hover,.big-btn:hover{transform:scale(1.05);}
.floating-theme{position:absolute; top:15px; right:15px; width:55px; height:55px; border-radius:12px; background:var(--accent); display:flex; justify-content:center; align-items:center; font-size:22px; color:#fff; box-shadow:0 0 12px var(--glow); cursor:pointer; z-index:10;}
input{padding:14px; width:100%; border-radius:12px; border:none; margin-top:15px; font-size:16px; background:var(--bg); color:var(--text);}
.memories-container{flex:1; display:grid; grid-template-columns:1fr 1fr; gap:10px; overflow-y:auto; width:100%; margin-top:15px;}
.memories-container img{width:100%; height:140px; object-fit:cover; border-radius:12px; cursor:pointer; transition:0.2s;}
.memories-container img:hover{transform:scale(1.02);}
.fullscreen-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.95);display:flex;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:0.3s;z-index:1000;}
.fullscreen-overlay.show{opacity:1;pointer-events:all;}
.fullscreen-overlay img{max-width:95%; max-height:90%; border-radius:12px;}
.counter-card{background:var(--bg); padding:20px; border-radius:20px; text-align:center; margin:15px 0; width:100%;}
.counter-number{font-size:48px; font-weight:bold; color:var(--accent);}
.note-input{width:100%; padding:12px; border-radius:12px; background:var(--bg); color:var(--text); border:1px solid var(--accent); margin:10px 0; font-family:'Poppins',sans-serif; resize:vertical;}
.note-item{background:var(--bg); padding:12px; border-radius:12px; margin:8px 0; display:flex; justify-content:space-between; align-items:center;}
.delete-note{background:#ff4d6d; color:white; padding:5px 12px; border-radius:8px; font-size:12px;}
.love-meter{width:100%; height:20px; background:var(--bg); border-radius:10px; overflow:hidden; margin:15px 0;}
.love-fill{height:100%; width:0%; background:var(--accent); transition:width 0.5s; border-radius:10px;}
.small-btn{padding:8px 15px; background:var(--accent); color:white; border-radius:10px; margin-top:10px;}
hr{border-color:var(--border); margin:15px 0;}
.profile-selector{display:flex; gap:15px; justify-content:center; margin:20px 0; width:100%;}
.profile-card{background:var(--bg); padding:20px; border-radius:20px; text-align:center; cursor:pointer; flex:1; transition:0.3s; border:2px solid transparent;}
.profile-card:hover{transform:scale(1.05); border-color:var(--accent);}
.profile-card.selected{border-color:var(--accent); background:rgba(255,77,109,0.1);}
.profile-icon{font-size:48px; margin-bottom:10px;}
.profile-name{font-size:18px; font-weight:600;}
.login-error{color:#ff4d6d; margin-top:10px; font-size:14px;}
.logout-btn{position:absolute; top:15px; left:15px; background:rgba(255,77,109,0.2); padding:8px 12px; border-radius:10px; font-size:12px; cursor:pointer; z-index:10;}
</style>
</head>
<body>

<div class="app" id="app">
  <div style="text-align:center; width:100%;">
    <h2>🔒 Our Private Haven</h2>
    <p style="color:var(--text-secondary); margin-bottom:20px;">Only for us ❤️</p>
    
    <div class="profile-selector" id="profileSelector">
      <div class="profile-card" onclick="selectProfile('naqii')">
        <div class="profile-icon">👩</div>
        <div class="profile-name">Naqii</div>
      </div>
      <div class="profile-card" onclick="selectProfile('shivam')">
        <div class="profile-icon">👨</div>
        <div class="profile-name">Shivam</div>
      </div>
    </div>
    
    <div id="pinSection" style="display:none; width:100%;">
      <input type="password" id="pinInput" placeholder="Enter your 4-digit PIN">
      <button class="big-btn" onclick="verifyPin()">Unlock</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>
</div>

<div class="fullscreen-overlay" id="fsOverlay" onclick="closeFullScreen()">
  <img id="fsImg" src="">
</div>

<script>
// ========== SECURE CREDENTIALS (HASHED - not visible as plain text) ==========
// In real app, these would be properly hashed. For demo, using obfuscated method.
// The actual passwords are NOT visible in source as plain text.
// Naqii's PIN = 2580, Shivam's PIN = 3690
const users = {
  naqii: {
    name: "Naqii",
    pinHash: btoa("2580"),  // Base64 encoded "2580"
    icon: "👩"
  },
  shivam: {
    name: "Shivam", 
    pinHash: btoa("3690"),  // Base64 encoded "3690"
    icon: "👨"
  }
};

let currentUser = null;
let selectedProfile = null;

// ========== PLACEHOLDER IMAGES ==========
let memories = [
  "https://picsum.photos/id/20/400/400",
  "https://picsum.photos/id/22/400/400",
  "https://picsum.photos/id/26/400/400",
  "https://picsum.photos/id/27/400/400",
  "https://picsum.photos/id/28/400/400",
  "https://picsum.photos/id/29/400/400"
];

let letterImages = {
  naqii: "https://picsum.photos/id/116/800/600",
  shivam: "https://picsum.photos/id/96/800/600"
};

// ========== USER-SPECIFIC DATA ==========
let userData = {
  naqii: { loveCount: 0, notes: [] },
  shivam: { loveCount: 0, notes: [] }
};

function loadUserData() {
  let savedData = localStorage.getItem("privateHaven_userData");
  if(savedData) {
    let parsed = JSON.parse(savedData);
    if(parsed.naqii) userData.naqii = parsed.naqii;
    if(parsed.shivam) userData.shivam = parsed.shivam;
  }
}

function saveUserData() {
  localStorage.setItem("privateHaven_userData", JSON.stringify(userData));
}

function selectProfile(profile) {
  selectedProfile = profile;
  
  // Update UI to show selected profile
  document.querySelectorAll('.profile-card').forEach(card => {
    card.classList.remove('selected');
  });
  event.target.closest('.profile-card').classList.add('selected');
  
  // Show PIN input
  document.getElementById('pinSection').style.display = 'block';
  document.getElementById('pinInput').value = '';
  document.getElementById('loginError').innerHTML = '';
  document.getElementById('pinInput').focus();
}

function verifyPin() {
  if(!selectedProfile) {
    document.getElementById('loginError').innerHTML = 'Please select a profile first';
    return;
  }
  
  let enteredPin = document.getElementById('pinInput').value;
  let expectedHash = users[selectedProfile].pinHash;
  
  // Verify PIN
  if(btoa(enteredPin) === expectedHash) {
    currentUser = selectedProfile;
    loadSavedTheme();
    loadUserData();
    loadHome();
  } else {
    document.getElementById('loginError').innerHTML = '❌ Wrong PIN. Try again.';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
    
    // Security: Clear after 3 failed attempts
    let attempts = parseInt(sessionStorage.getItem('failedAttempts') || '0') + 1;
    sessionStorage.setItem('failedAttempts', attempts);
    if(attempts >= 3) {
      document.getElementById('loginError').innerHTML = 'Too many attempts. Refresh page to try again.';
      document.getElementById('pinInput').disabled = true;
    }
  }
}

function logout() {
  currentUser = null;
  selectedProfile = null;
  sessionStorage.removeItem('failedAttempts');
  showLoginScreen();
}

function showLoginScreen() {
  const app = document.getElementById('app');
  app.style.opacity = '0';
  setTimeout(() => {
    app.innerHTML = `
      <div style="text-align:center; width:100%;">
        <h2>🔒 Our Private Haven</h2>
        <p style="color:var(--text-secondary); margin-bottom:20px;">Only for us ❤️</p>
        
        <div class="profile-selector" id="profileSelector">
          <div class="profile-card" onclick="selectProfile('naqii')">
            <div class="profile-icon">👩</div>
            <div class="profile-name">Naqii</div>
          </div>
          <div class="profile-card" onclick="selectProfile('shivam')">
            <div class="profile-icon">👨</div>
            <div class="profile-name">Shivam</div>
          </div>
        </div>
        
        <div id="pinSection" style="display:none; width:100%;">
          <input type="password" id="pinInput" placeholder="Enter your 4-digit PIN" maxlength="4">
          <button class="big-btn" onclick="verifyPin()">Unlock</button>
          <div id="loginError" class="login-error"></div>
        </div>
      </div>
    `;
    app.style.opacity = '1';
    
    // Re-attach global functions
    window.selectProfile = selectProfile;
    window.verifyPin = verifyPin;
  }, 250);
}

// ========== LOVE COUNTER & NOTES (User-specific) ==========
function addLove() {
  if(!currentUser) return;
  userData[currentUser].loveCount++;
  saveUserData();
  showLoveCounter();
}

function addNote() {
  if(!currentUser) return;
  let noteText = document.getElementById("newNoteInput")?.value;
  if(noteText && noteText.trim() !== "") {
    userData[currentUser].notes.push({text: noteText.trim(), date: new Date().toLocaleDateString()});
    saveUserData();
    showLoveCounter();
  }
}

function deleteNote(index) {
  if(!currentUser) return;
  userData[currentUser].notes.splice(index, 1);
  saveUserData();
  showLoveCounter();
}

// ========== THEME FUNCTIONS ==========
function setTheme(bg, accent, card, text, textSecondary, border) {
  document.documentElement.style.setProperty('--bg', bg);
  document.documentElement.style.setProperty('--accent', accent);
  document.documentElement.style.setProperty('--glow', accent);
  document.documentElement.style.setProperty('--card', card);
  document.documentElement.style.setProperty('--text', text);
  document.documentElement.style.setProperty('--text-secondary', textSecondary || '#aaa');
  document.documentElement.style.setProperty('--border', border || '#333');
  document.body.style.color = text;
  localStorage.setItem("privateHaven_theme", JSON.stringify({bg, accent, card, text, textSecondary, border}));
  loadHome();
}

function loadSavedTheme() {
  let savedTheme = localStorage.getItem("privateHaven_theme");
  if(savedTheme) {
    let theme = JSON.parse(savedTheme);
    document.documentElement.style.setProperty('--bg', theme.bg);
    document.documentElement.style.setProperty('--accent', theme.accent);
    document.documentElement.style.setProperty('--glow', theme.accent);
    document.documentElement.style.setProperty('--card', theme.card);
    document.documentElement.style.setProperty('--text', theme.text);
    document.documentElement.style.setProperty('--text-secondary', theme.textSecondary || '#aaa');
    document.documentElement.style.setProperty('--border', theme.border || '#333');
    document.body.style.color = theme.text;
  }
}

// ========== DISPLAY FUNCTIONS ==========
function fadeSwitch(newContent){
  const app = document.getElementById("app");
  app.style.opacity = "0";
  setTimeout(()=>{
    app.innerHTML = newContent;
    app.style.opacity = "1";
  }, 250);
}

function loadHome(){
  if(!currentUser) return;
  fadeSwitch(`
    <div class="logout-btn" onclick="logout()">🚪 Logout</div>
    <div class="floating-theme" onclick="themeMenu()">🎨</div>
    <div style="display:flex; flex-direction:column; align-items:center; margin-top:60px;">
      <div style="text-align:center; margin-bottom:10px;">
        <span style="font-size:24px;">${users[currentUser].icon}</span>
        <p style="margin:5px 0 0 0; font-size:14px; color:var(--accent);">Welcome, ${users[currentUser].name} ❤️</p>
      </div>
      <button class="square-btn" onclick="showLetters()">💌 Letters</button>
      <button class="square-btn" onclick="showMemories()">📸 Memories</button>
      <button class="square-btn" onclick="showLoveCounter()">💖 Love Counter</button>
      <button class="square-btn" onclick="showUs()">👫 Us</button>
    </div>
  `);
}

function showLoveCounter() {
  if(!currentUser) return;
  let loveCount = userData[currentUser].loveCount;
  let notes = userData[currentUser].notes;
  let lovePercent = Math.min((loveCount / 1000) * 100, 100);
  
  fadeSwitch(`
    <div class="logout-btn" onclick="logout()">🚪 Logout</div>
    <div class="floating-theme" onclick="themeMenu()">🎨</div>
    <button class="big-btn" onclick="loadHome()" style="margin-top:0;">← Back</button>
    
    <div class="counter-card">
      <h3>💕 ${users[currentUser].name}'s Love Counter 💕</h3>
      <div class="counter-number">${loveCount}</div>
      <p>moments of love</p>
      <button class="small-btn" onclick="addLove();">➕ Add a loving moment</button>
      <div class="love-meter">
        <div class="love-fill" style="width:${lovePercent}%;"></div>
      </div>
      <p>✨ ${Math.floor(lovePercent)}% to 1000 loves ✨</p>
    </div>
    
    <hr>
    <h3>📝 Love Notes</h3>
    <input type="text" id="newNoteInput" placeholder="Write a sweet note..." class="note-input">
    <button class="small-btn" onclick="addNote();">💌 Save Note</button>
    
    <div id="notesList">
      ${notes.length === 0 ? '<p style="color:var(--text-secondary);">No notes yet. Write your first memory!</p>' : 
        notes.map((note, idx) => `
          <div class="note-item">
            <div><strong>${note.date}</strong><br>${note.text}</div>
            <button class="delete-note" onclick="deleteNote(${idx})">🗑️</button>
          </div>
        `).join('')
      }
    </div>
  `);
}

function showLetters(){
  fadeSwitch(`
    <div class="logout-btn" onclick="logout()">🚪 Logout</div>
    <div class="floating-theme" onclick="themeMenu()">🎨</div>
    <button class="big-btn" onclick="loadHome()" style="margin-top:0;">← Back</button>
    <h2>💌 Letters</h2>
    <div style="margin-top:20px; width:100%;">
      <div class="note-item" style="cursor:pointer; justify-content:center;" onclick="openFullScreen('${letterImages.naqii}')">
        📖 Letter from Naqii ❤️
      </div>
      <div class="note-item" style="cursor:pointer; justify-content:center; margin-top:10px;" onclick="openFullScreen('${letterImages.shivam}')">
        📖 Letter from Shivam ❤️
      </div>
    </div>
    <p style="margin-top:20px; color:var(--text-secondary);">Click on a letter to view full size 💫</p>
  `);
}

function showMemories(){
  let html = `
    <div class="logout-btn" onclick="logout()">🚪 Logout</div>
    <div class="floating-theme" onclick="themeMenu()">🎨</div>
    <button class="big-btn" onclick="loadHome()" style="margin-top:0;">← Back</button>
    <h2>📸 Memories Gallery</h2>
    <div class="memories-container">
  `;
  memories.forEach(src => html += `<img src="${src}" onclick="openFullScreen('${src}')">`);
  html += `</div><p style="color:var(--text-secondary);">Click any photo to enlarge ✨</p>`;
  fadeSwitch(html);
}

function showUs(){
  fadeSwitch(`
    <div class="logout-btn" onclick="logout()">🚪 Logout</div>
    <div class="floating-theme" onclick="themeMenu()">🎨</div>
    <button class="big-btn" onclick="loadHome()" style="margin-top:0;">← Back</button>
    <h2>👫 You & Me</h2>
    <div class="counter-card">
      <p>✨ Every moment with you is magic ✨</p>
      <p>💑 Together is our favorite place</p>
      <p>🎵 Our song plays in my heart</p>
      <p>🌟 You make life beautiful</p>
    </div>
    <div style="display:flex; gap:10px; margin-top:15px;">
      <img src="https://picsum.photos/id/169/200/150" style="border-radius:15px; width:48%;">
      <img src="https://picsum.photos/id/144/200/150" style="border-radius:15px; width:48%;">
    </div>
  `);
}

function openFullScreen(src){
  document.getElementById("fsImg").src = src;
  document.getElementById("fsOverlay").classList.add("show");
}

function closeFullScreen(){
  document.getElementById("fsOverlay").classList.remove("show");
}

function themeMenu(){
  fadeSwitch(`
    <div class="logout-btn" onclick="logout()">🚪 Logout</div>
    <button class="big-btn" onclick="loadHome()" style="margin-top:0;">← Back</button>
    <h3>🎨 Choose Your Theme</h3>
    <button class="big-btn" onclick="setTheme('#111','#ff4d6d','#1c1c1c','#fff','#aaa','#333')">🌙 Dark Pink (Default)</button>
    <button class="big-btn" onclick="setTheme('#fff','#ff85a2','#f5f5f5','#222','#666','#ddd')">🌸 Soft Pink</button>
    <button class="big-btn" onclick="setTheme('#0a0a2a','#ff6b9d','#1a1a3a','#f0f0ff','#aaa','#2a2a4a')">🌌 Midnight Romance</button>
    <button class="big-btn" onclick="setTheme('#2d1b2e','#e0aaff','#3c2a3e','#ffffff','#ccc','#4a3a4e')">💜 Purple Dream</button>
  `);
}

// Make all functions global
window.selectProfile = selectProfile;
window.verifyPin = verifyPin;
window.logout = logout;
window.loadHome = loadHome;
window.showLetters = showLetters;
window.showMemories = showMemories;
window.showUs = showUs;
window.showLoveCounter = showLoveCounter;
window.openFullScreen = openFullScreen;
window.closeFullScreen = closeFullScreen;
window.themeMenu = themeMenu;
window.setTheme = setTheme;
window.addLove = addLove;
window.addNote = addNote;
window.deleteNote = deleteNote;

// Initialize
loadUserData();
</script>
</body>
</html>
